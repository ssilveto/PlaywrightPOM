name: Playwright Multi-Browser Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      # 1️⃣ Checkout project
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 4️⃣ Build project
      - name: Build project
        run: dotnet build --no-restore

      # 5️⃣ Install Playwright browsers
      - name: Install Playwright browsers
        run: pwsh bin/Debug/net10.0/playwright.ps1 install

      # 6️⃣ Run tests for the current browser
      - name: Run tests on ${{ matrix.browser }}
        env:
          BROWSER: ${{ matrix.browser }}
        run: dotnet test --logger "trx;LogFileName=TestResults_${{ matrix.browser }}.trx"

      # 7️⃣ Upload videos and screenshots as artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            videos/${{ matrix.browser }}
            screenshots/${{ matrix.browser }}
			