name: Playwright Multi-Browser Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

						  
    steps:
      # 1️⃣ Checkout project
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 3️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # 4️⃣ Build project
      - name: Build project
        run: dotnet build --no-restore

      # 5️⃣ Install Playwright browsers (.NET CLI)
      - name: Install Playwright browsers
        run: dotnet tool restore
      - run: dotnet tool run playwright install

      # 6️⃣ Run tests for the current browser
      - name: Run tests on ${{ matrix.browser }}
        env:
          BROWSER: ${{ matrix.browser }}
        run: dotnet test --logger "trx;LogFileName=TestResults_${{ matrix.browser }}.trx"

      # 7️⃣ Upload video
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ matrix.browser }}
          path: videos/${{ matrix.browser }}

      # 8️⃣ Upload screenshots
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/${{ matrix.browser }}

			  
						  
		  
						   
								 

						
									 
			 
								

								  
						   

						   
									  

										 
								   

							  
			
						 
																		  

								 
										
			 
							 
							 

									   
										
			 
								  
								  