name: Playwright Multi-Browser Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-chromium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --no-restore

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run Chromium tests
        env:
          BROWSER: chromium
        run: dotnet test --logger "trx;LogFileName=TestResults_chromium.trx"

      - name: Upload Chromium video
        uses: actions/upload-artifact@v4
        with:
          name: videos-chromium
          path: videos/chromium

      - name: Upload Chromium screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-chromium
          path: screenshots/chromium

  test-firefox:
